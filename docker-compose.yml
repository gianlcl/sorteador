services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=3000
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # Port exposed only in dev for local inspection (e.g. redis-cli)
    # Remove or comment out in production
    #ports:
    #  - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  redis_data:
